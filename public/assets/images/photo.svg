<svg 
    width="36" 
    height="36" 
    viewBox="0 0 36 36" 
    fill="none" 
    xmlns="http://www.w3.org/2000/svg"
    class="flex-shrink-0"
  >
    <!-- Circle Background -->
    <circle cx="18" cy="18" r="18" fill="#E50914"/>
    
    <!-- Outer ring (film perforations) -->
    <circle cx="18" cy="18" r="15" stroke="#141414" stroke-width="1.5" fill="none" stroke-dasharray="2 3"/>
    
    <!-- Inner circle border -->
    <circle cx="18" cy="18" r="13" fill="none" stroke="#141414" stroke-width="1"/>
    
    <!-- M Letter -->
    <text 
      x="18" 
      y="25" 
      text-anchor="middle" 
      font-family="'Inter', sans-serif" 
      font-size="20" 
      font-weight="800" 
      fill="#FFFFFF"
      letter-spacing="0"
    >
      M
    </text>

    <!-- Small film strip decoration -->
    <rect x="6" y="27" width="3" height="3" rx="0.5" fill="#141414" opacity="0.3"/>
    <rect x="13" y="27" width="3" height="3" rx="0.5" fill="#141414" opacity="0.3"/>
    <rect x="20" y="27" width="3" height="3" rx="0.5" fill="#141414" opacity="0.3"/>
    <rect x="27" y="27" width="3" height="3" rx="0.5" fill="#141414" opacity="0.3"/>
  </svg>
