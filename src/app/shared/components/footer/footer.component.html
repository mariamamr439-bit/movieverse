<footer class="border-t border-border bg-background/90 backdrop-blur-xl mt-auto">
  <div class="container mx-auto px-4 py-8">

    <!-- Footer Content -->
    <div class="grid grid-cols-2 gap-8 md:grid-cols-4">

      <!-- Brand -->
      <div class="col-span-2 md:col-span-1">
        <a routerLink="/home" class="flex items-center gap-3">
          <svg width="32" height="32" viewBox="0 0 36 36" fill="none">
            <circle cx="18" cy="18" r="18" fill="#A00E13"/>
            <circle cx="18" cy="18" r="15" fill="none" stroke="#141414" stroke-width="1.5" stroke-dasharray="2 3"/>
            <circle cx="18" cy="18" r="13" fill="none" stroke="#141414" stroke-width="1"/>
            <text x="18" y="25" text-anchor="middle" font-size="20" font-weight="800" fill="white">M</text>
          </svg>
          <span class="text-xl font-extrabold text-primary">MovieVerse</span>
        </a>
        <p class="mt-3 text-sm text-text-secondary max-w-xs leading-relaxed">
          Discover, explore, and track your favorite movies and TV shows.
        </p>
      </div>

      <!-- Quick Links -->
      <div>
        <h3 class="text-sm font-semibold text-white uppercase tracking-wider mb-3">Browse</h3>
        <ul class="space-y-2 text-sm">
          <li><a routerLink="/home" class="text-text-secondary hover:text-white transition">Home</a></li>
          <li><a routerLink="/movies" class="text-text-secondary hover:text-white transition">Movies</a></li>
          <li><a routerLink="/tv" class="text-text-secondary hover:text-white transition">TV Shows</a></li>
        </ul>
      </div>

      <!-- Support -->
      <div>
        <h3 class="text-sm font-semibold text-white uppercase tracking-wider mb-3">Support</h3>
        <ul class="space-y-2 text-sm">
          <li><a  class="text-text-secondary hover:text-white transition">Help Center</a></li>
          <li><a  class="text-text-secondary hover:text-white transition">Privacy Policy</a></li>
          <li><a  class="text-text-secondary hover:text-white transition">Terms of Service</a></li>
        </ul>
      </div>

      <!-- Social -->
      <div>
        <h3 class="text-sm font-semibold text-white uppercase tracking-wider mb-3">Follow Us</h3>
        <div class="flex gap-3">
          <a  class="flex h-10 w-10 items-center justify-center rounded-xl border border-border text-text-secondary hover:border-primary hover:text-white transition">
            <i class="fa-brands fa-twitter"></i>
          </a>
          <a  class="flex h-10 w-10 items-center justify-center rounded-xl border border-border text-text-secondary hover:border-primary hover:text-white transition">
            <i class="fa-brands fa-instagram"></i>
          </a>
          <a  class="flex h-10 w-10 items-center justify-center rounded-xl border border-border text-text-secondary hover:border-primary hover:text-white transition">
            <i class="fa-brands fa-youtube"></i>
          </a>
        </div>
      </div>

    </div>

    <!-- Divider -->
    <div class="mt-8 pt-6 border-t border-border flex flex-col sm:flex-row items-center justify-between gap-4">
      <p class="text-xs text-text-muted">
        &copy; {{ currentYear }} MovieVerse. All rights reserved.
      </p>
      <p class="text-xs text-text-muted flex items-center gap-1.5">
        Powered by
        <a  class="text-primary hover:underline transition">
          TMDB
        </a>
      </p>
    </div>

  </div>
</footer>
