<a [routerLink]="link()" class="block group">
  <div class="relative rounded-xl overflow-hidden bg-surface-light transition-all duration-300 hover:-translate-y-2 hover:shadow-xl hover:shadow-primary/10">

    <!-- Poster -->
    <div class="aspect-2/3 overflow-hidden bg-surface">
      <img
        [src]="posterUrl()"
        [alt]="title()"
        class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110"
        loading="lazy"
      />
    </div>

    <!-- Rating Badge -->
    @if (rating()) {
      <div class="absolute top-2 right-2 bg-black/80 backdrop-blur-sm px-2 py-1 rounded-lg text-xs font-semibold text-yellow-400 flex items-center gap-1">
        <i class="fa-solid fa-star text-[10px]"></i>
        {{ rating() }}
      </div>
    }

    <!-- Info -->
    <div class="p-3">
      <h3 class="text-sm font-semibold text-white truncate group-hover:text-primary transition">
        {{ title() }}
      </h3>
      @if (year()) {
        <p class="text-xs text-text-secondary">{{ year() }}</p>
      }
    </div>

    <!-- Hover Overlay -->
    <div class="absolute inset-0 bg-linear-to-t from-black/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-end p-4">
      <span class="text-sm font-medium text-white flex items-center gap-2">
        <i class="fa-solid fa-circle-play text-primary"></i>
        View Details
      </span>
    </div>

  </div>
</a>
